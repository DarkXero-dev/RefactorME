<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Refactor.me, 25 design directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --base:#0c0e15;
    --panel:#141826;
    --line:rgba(220,226,240,.10);
    --ink:#e7ebf5;
    --dim:#9aa3b8;
    --faint:#6b7488;
    --accent:#9fb3ff;
    --accent-2:#7e8cff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(120,140,220,.12), transparent 55%),
      radial-gradient(90% 60% at 90% 110%, rgba(70,80,150,.18), transparent 60%),
      #0c0e15;
    color:var(--ink);
    font-family:'Manrope', system-ui, sans-serif;
    line-height:1.5;
    min-height:100vh;
  }
  header{
    padding:clamp(2rem,5vw,3.4rem) clamp(1.2rem,4vw,3rem) 1.6rem;
    max-width:1500px;margin:0 auto;
  }
  .eyebrow{
    font-size:.74rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);margin-bottom:1rem;
  }
  h1{
    font-family:'Spectral', Georgia, serif;
    font-weight:600;font-size:clamp(2rem,1.2rem+3vw,3.4rem);
    letter-spacing:-.01em;line-height:1.05;margin-bottom:.8rem;
  }
  h1 em{color:var(--accent);font-style:italic}
  .lede{color:var(--dim);max-width:60ch;font-size:1.05rem}
  .hint{color:var(--faint);font-size:.86rem;margin-top:.8rem}

  .grid{
    max-width:1500px;margin:0 auto;
    padding:1.4rem clamp(1.2rem,4vw,3rem) 4rem;
    display:grid;gap:1.4rem;
    grid-template-columns:repeat(auto-fill, minmax(420px, 1fr));
  }
  @media (max-width:520px){
    .grid{grid-template-columns:1fr}
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(159,179,255,.5);
    box-shadow:0 24px 50px -30px rgba(0,0,0,.8);
  }
  .bar{
    display:flex;align-items:baseline;gap:.7rem;
    padding:.85rem 1rem;
    border-bottom:1px solid var(--line);
  }
  .num{
    font-variant-numeric:tabular-nums;
    font-weight:700;font-size:.8rem;color:var(--accent);
    background:rgba(159,179,255,.12);
    border-radius:6px;padding:.18rem .45rem;
  }
  .name{font-weight:600;font-size:.95rem}
  .open{
    margin-left:auto;font-size:.78rem;color:var(--dim);
    border:1px solid var(--line);border-radius:999px;padding:.25rem .7rem;
    transition:color .2s ease, border-color .2s ease;
  }
  .card:hover .open{color:var(--accent);border-color:rgba(159,179,255,.5)}

  /* scaled live preview */
  .shot{
    position:relative;
    width:100%;
    aspect-ratio:1280 / 760;
    overflow:hidden;
    background:#0a0c12;
  }
  .shot iframe{
    position:absolute;top:0;left:0;
    width:1280px;height:760px;
    border:0;
    transform-origin:0 0;
    /* scaled by JS to card width; fallback below */
    transform:scale(.328);
    pointer-events:none;
  }
  /* click overlay opens the full preview */
  .shot a.cover{
    position:absolute;inset:0;z-index:2;display:block;
  }
</style>
</head>
<body>
  <header>
    <p class="eyebrow">Refactor.me</p>
    <h1>Twenty-five <em>directions</em>.</h1>
    <p class="lede">Each tile is a live, self-contained concept: its own palette, type, and layout. All dark, all cool-toned, none a terminal look. Click any tile to open it full size.</p>
    <p class="hint">Tip: tiles are live pages scaled down, so first paint may take a moment as fonts load.</p>
  </header>

  <main class="grid" id="grid"></main>

  <script>
    const concepts = [
      "Gintsugi Silver","Glacial Minimal","Brutalist Cobalt","Aurora Gradient",
      "Editorial Indigo Magazine","Blueprint Cyan","Glassmorphism Frost","Swiss Grid Steel",
      "Constellation Stellar","Vapor Cool","Liquid Chrome Cool","Art Deco Indigo",
      "Monolith Architectural","Bauhaus Cool","Sumi-e Indigo","Cyber Noir Rain",
      "Memphis Cool","Stained Glass Cool","Origami Slate","Data Viz Dashboard",
      "Luxury Velvet Aubergine","Kinetic Type Brutal","Frutiger Aero Cool",
      "Risograph Cool Duotone","Tokonoma Zen Editorial"
    ];
    const grid = document.getElementById('grid');
    concepts.forEach((name, i) => {
      const n = String(i + 1).padStart(2, '0');
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML =
        '<div class="bar">' +
          '<span class="num">' + n + '</span>' +
          '<span class="name">' + name + '</span>' +
          '<span class="open">open &#8599;</span>' +
        '</div>' +
        '<div class="shot">' +
          '<a class="cover" href="' + n + '.html" target="_blank" rel="noopener" aria-label="Open ' + name + ' full size"></a>' +
          '<iframe loading="lazy" title="' + name + '" src="' + n + '.html" scrolling="no"></iframe>' +
        '</div>';
      grid.appendChild(card);
    });

    // scale each iframe to its card width so the 1280px desktop layout fits
    function rescale(){
      document.querySelectorAll('.shot').forEach(shot => {
        const f = shot.querySelector('iframe');
        const s = shot.clientWidth / 1280;
        f.style.transform = 'scale(' + s + ')';
        f.style.height = (shot.clientHeight / s) + 'px';
      });
    }
    window.addEventListener('load', rescale);
    window.addEventListener('resize', rescale);
    setTimeout(rescale, 300);
  </script>
</body>
</html>
