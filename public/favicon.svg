<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Refaktor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15294a"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="leg" x1="205" y1="238" x2="338" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41cfe0"/>
      <stop offset="1" stop-color="#4f8cff"/>
    </linearGradient>
    <linearGradient id="pulse" x1="86" y1="0" x2="426" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41cfe0"/>
      <stop offset="1" stop-color="#4f8cff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- R: stem + bowl -->
  <path d="M182 132 V396" fill="none" stroke="#f7f9fc" stroke-width="46" stroke-linecap="round"/>
  <path d="M182 155 H252 a60 60 0 0 1 0 120 H182" fill="none" stroke="#f7f9fc" stroke-width="46" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- R leg, drawn as the rising gradient stroke -->
  <path d="M206 244 L330 396" fill="none" stroke="url(#leg)" stroke-width="46" stroke-linecap="round"/>

  <!-- heartbeat baseline -->
  <path d="M96 398 H170 l14 -34 l17 64 l14 -44 l9 18 H424" fill="none" stroke="url(#pulse)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="168" cy="398" r="12" fill="#f7f9fc"/>
  <circle cx="330" cy="398" r="14" fill="#4f8cff"/>
</svg>
